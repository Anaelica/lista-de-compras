<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Lista de compras</title>
</head>
<body>
        <div class="card-container">
            <div class="quik">
                <img src="assets/icons/logo.svg" id="logo" alt="Logo QUicklist">
                <h1>quiklist</h1>
            </div>
            <header id="top">
                <form>
                    <label for="search" style="display: none;">Adicionar item</label>
                    <input type="text" id="search" placeholder="Adicionar um novo item">
                    <button id="btn" class="btn">Adicionar item</button>
                </form>
            </header>
            
            <main>
                    <div class="itens">
                       <ul class="product">
                        <li class="items">
                            <label class="item-check">
                                <input type="checkbox" class="check">
                                <span class="custom-check"></span>
                            </label>
                            <span class="text">Pão de forma</span>
                            <img class="lixo" src="assets/icons/lixo-li.svg" alt="">
                        </li>

                        <li class="items">
                            <label class="item-check">
                                <input type="checkbox" class="check">
                                <span class="custom-check"></span>
                            </label>
                            <span class="text">Café preto</span>
                            <img class="lixo" src="assets/icons/lixo-li.svg" alt="">
                        </li>
                    </ul>   
                    </div>
            </main>
        </div>

    <script src="script.js"></script>
</body>
</html>
